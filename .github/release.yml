changelog:
  categories:
    - title: Breaking Changes
      labels:
        - breaking
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Maintenance
      labels:
        - chore
        - maintenance
        - docs
    - title: Other Changes
      labels:
        - "*"

